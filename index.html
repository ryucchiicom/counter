<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>counter</title>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        user-select: none;
        flex-direction: column;
        transition: 0.2s;
    }

    #counter {
        font-size: 80px;
        text-align: center;
    }

    #step {
        font-size: 20px;
        margin-top: 10px;
        opacity: 0;
        transition: 0.15s;
    }

    #mobileControls {
        position: fixed;
        bottom: 20px;
        display: none;
        gap: 10px;
    }

    button {
        font-size: 22px;
        padding: 12px 18px;
        border: none;
        border-radius: 10px;
        background: #333;
        color: white;
    }

    button:active {
        background: #555;
    }

    @media (pointer: coarse) {
        #mobileControls {
            display: flex;
        }
    }
</style>
</head>

<body>

<div id="counter">0</div>
<div id="step">step: 1</div>

<div id="mobileControls">
    <button onclick="toggleShift()">Shift</button>
    <button onclick="change(-step)">-</button>
    <button onclick="reset()">0</button>
    <button onclick="change(step)">+</button>
</div>

<script>
let count = 0;
let step = 1;

let isShift = false;
let isLight = false; // false = dark mode（初期）

const counter = document.getElementById("counter");
const stepDisplay = document.getElementById("step");
const body = document.body;

function update() {
    counter.textContent = count;
    stepDisplay.textContent = "step: " + step;
}

// 背景・文字色更新
function updateTheme() {
    if (isLight) {
        body.style.background = "#fff";
        body.style.color = "#000";
    } else {
        body.style.background = "#111";
        body.style.color = "#fff";
    }
}

// カウント
function change(val) {
    count += val;
    update();
}

function reset() {
    count = 0;
    update();
}

// Shiftトグル（スマホ用）
function toggleShift() {
    isShift = !isShift;
    stepDisplay.style.opacity = isShift ? 1 : 0;
}

// キー入力
document.addEventListener("keydown", (e) => {

    // テーマ変更
    if (e.key === "l" || e.key === "L") {
        isLight = true;
        updateTheme();
    }
    if (e.key === "d" || e.key === "D") {
        isLight = false;
        updateTheme();
    }

    // Shift表示
    if (e.key === "Shift") {
        isShift = true;
        stepDisplay.style.opacity = 1;
    }

    // +操作
    if (["w","d","ArrowUp","ArrowRight",";"].includes(e.key)) {
        if (e.shiftKey || isShift) {
            step++;
        } else {
            change(step);
        }
    }

    // -操作
    if (["s","a","ArrowDown","ArrowLeft","-"].includes(e.key)) {
        if (e.shiftKey || isShift) {
            step--;
        } else {
            change(-step);
        }
    }
});

document.addEventListener("keyup", (e) => {
    if (e.key === "Shift") {
        isShift = false;
        stepDisplay.style.opacity = 0;
    }
});

// クリック操作（PC）
document.addEventListener("mousedown", (e) => {

    if (e.shiftKey || isShift) {
        if (e.button === 2) {
            step++;
        } else if (e.button === 0) {
            step--;
        }
        update();
        return;
    }

    if (e.button === 0) change(-step);
    else if (e.button === 2) change(step);
    else if (e.button === 1) reset();
});

document.addEventListener("contextmenu", e => e.preventDefault());

updateTheme();
update();
</script>

</body>
</html>
