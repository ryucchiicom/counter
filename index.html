        const snap = await tx.get(state.roomRef);
        if (!snap.exists()) return;

        const data = snap.data() || {};
        const live = data.state || {};
        const players = data.players || {};
        const rematchVotes = data.rematchVotes || {};
        const now = Date.now();

        const mySide = players.black === state.playerId ? "black"
                     : players.white === state.playerId ? "white"
                     : "spectator";
        if (mySide === "spectator") return;

        if (!live.winner || !players.black || !players.white) return;

        if (yes) rematchVotes[state.playerId] = true;
        else delete rematchVotes[state.playerId];

        const blackPid = players.black;
        const whitePid = players.white;
        const bothYes = !!rematchVotes[blackPid] && !!rematchVotes[whitePid];
        const historyWinner = data.lastWinnerSide || live.lastWinnerSide || live.winner || null;

        if (bothYes) {
          const blackOutcome = await fetchProfileOutcome(tx, blackPid);
          const whiteOutcome = await fetchProfileOutcome(tx, whitePid);
          const labels = royalLabelsFromOutcomes(blackOutcome, whiteOutcome, blackPid, whitePid);
          tx.update(state.roomRef, {
            state: freshState(labels),
            lastWinnerSide: historyWinner,
            matchStartAt: now + COUNTDOWN_MS,
            rematchVotes: {},
            forceHomeAt: null,
            updatedAt: now
          });
          return;
        }

        if (!yes) {
          tx.update(state.roomRef, {
            rematchVotes: {},
            forceHomeAt: now,
            updatedAt: now
          });
          return;
        }

        tx.update(state.roomRef, {
          rematchVotes,
          updatedAt: now
        });
      }).catch(err => {
        setStatus(`リマッチの処理に失敗した: ${err.message}`);
      });

      if (!yes) leaveToHome();
    }

    function refreshLocalRematchImmediate() {
      if (!state.roomData) return;
      const historyWinner = state.roomData.lastWinnerSide || state.roomData.state?.lastWinnerSide || null;
      const royalLabels = buildRoyalLabels(historyWinner);
      refreshLocalGame(royalLabels);
      rematchOverlay.classList.remove("show");
    }

    function cpuRecordMoveIfNeeded(liveBefore, selected, dest, move, nextState, capturedPiece) {
      if (session.kind !== "cpu") return;
      const piece = selected.kind === "piece" ? liveBefore.pieces.find(p => p.id === selected.id) : null;
      const entry = {
        pieceId: piece ? piece.id : null,
        features: [],
        reward: 0
      };
      const scored = scoreCpuAction(
        liveBefore,
        selected,
        dest,
        move,
        nextState,
        capturedPiece && capturedPiece.side === "white" ? capturedPiece : null
      );
      entry.features = scored.features;
      cpuBrain.episode.push(entry);
      if (piece) cpuBrain.pieceMoveIndex[piece.id] = cpuBrain.episode.length - 1;
      cpuAdjustStat("moves", 1);
      if (capturedPiece && capturedPiece.side === "white") cpuRewardImmediateFromCapture(capturedPiece, entry);
    }

    function cpuRewardImmediateFromCapture(capturedPiece, entry) {
      if (!capturedPiece || !entry) return;
      const reward = Math.max(0.12, cpuValue(capturedPiece.type) / 1000);
      cpuAdjustStat("captures", 1);
      cpuAdjustWeight(`capture:${capturedPiece.type}`, reward * 0.15);
      cpuApplyRewardToEntry(entry, reward);
      saveCpuBrainToStorage();
    }

    function cpuPenaltyForCapturedWhitePiece(piece) {
      if (session.kind !== "cpu") return;
      cpuAdjustWeight(`lost:${piece.type}`, -Math.max(0.12, cpuValue(piece.type) / 1000));
      const idx = cpuBrain.pieceMoveIndex[piece.id];
      if (idx != null && cpuBrain.episode[idx]) {
        cpuApplyRewardToEntry(cpuBrain.episode[idx], -Math.max(0.5, cpuValue(piece.type) / 500));
      }
      saveCpuBrainToStorage();
    }

    function cpuValue(type) {
      return {
        king: 10000,
        rook: 500,
        bishop: 450,
        gold: 320,
        silver: 280,
        knight: 240,
        lance: 220,
        pawn: 120,
        tokin: 200,
        proLance: 200,
        proKnight: 200,
        proSilver: 200,
        horse: 650,
        dragon: 700
      }[type] || 100;
    }

    function cpuCandidateActions(live) {
      const now = Date.now();
      const actions = [];
      const side = "white";

      for (const p of live.pieces) {
        if (p.side !== side) continue;
        if (p.cooldownUntil && now < p.cooldownUntil) continue;
        const moves = legalMovesForPiece(live, p, true);
        for (const mv of moves) {
          actions.push({
            selected: { kind: "piece", id: p.id },
            dest: { x: mv.x, y: mv.y },
            move: mv
          });
        }
      }

      if ((live.handCooldownUntil?.white || 0) <= now) {
        for (const t of pieceOrder) {
          const count = live.hands.white?.[t] || 0;
          if (!count) continue;
          for (let y = 0; y < 9; y++) {
            for (let x = 0; x < 9; x++) {
              if (pieceAt(live.pieces, x, y)) continue;
              actions.push({
                selected: { kind: "hand", side: "white", type: t },
                dest: { x, y },
                move: { x, y, kind: "normal", nextMode: "normal" }
              });
            }
          }
        }
      }

      return actions;
    }

    function cpuThink() {
      if (!isCPU() || !state.roomData) return;
      const live = state.roomData.state;
      if (!live || live.winner) return;

      const now = Date.now();
      if (state.roomData.matchStartAt && now < state.roomData.matchStartAt) {
        scheduleCpuThink(state.roomData.matchStartAt - now + 30);
        return;
      }

      const actions = cpuCandidateActions(live);
      if (!actions.length) {
        scheduleCpuThink(500);
        return;
      }

      const scored = [];
      for (const action of actions) {
        const next = applyActionToLive(live, action.selected, "white", action.dest, false);
        if (!next) continue;
        const captured = pieceAt(live.pieces, action.dest.x, action.dest.y);
        const result = scoreCpuAction(live, action.selected, action.dest, action.move, next, captured && captured.side === "white" ? captured : null);
        scored.push({ ...action, next, score: result.score, features: result.features, captured });
      }

      if (!scored.length) {
        scheduleCpuThink(350);
        return;
      }

      scored.sort((a, b) => b.score - a.score);
      const top = scored.slice(0, Math.min(6, scored.length));
      const pick = top[Math.floor(Math.random() * top.length)];

      if (pick.selected.kind === "piece") {
        const movedPieceId = pick.selected.id;
        cpuBrain.episode.push({
          pieceId: movedPieceId,
          features: pick.features,
          reward: 0
        });
        cpuBrain.pieceMoveIndex[movedPieceId] = cpuBrain.episode.length - 1;
        cpuAdjustStat("moves", 1);
        if (pick.captured && pick.captured.side === "white") {
          cpuRewardImmediateFromCapture(pick.captured, cpuBrain.episode[cpuBrain.episode.length - 1]);
        }
      } else {
        cpuBrain.episode.push({
          pieceId: null,
          features: pick.features,
          reward: 0
        });
        cpuAdjustStat("moves", 1);
      }

      state.roomData.state = pick.next;
      state.roomData.updatedAt = now;
      scheduleRender(0);
      scheduleCpuThink(450);
    }

    async function flushCpuBrainToCloud() {
      if (session.kind !== "cpu") return;
      const hasDeltaWeights = Object.keys(cpuBrain.deltaWeights).length > 0;
      const hasDeltaStats = Object.values(cpuBrain.deltaStats).some(v => v !== 0);
      if (!hasDeltaWeights && !hasDeltaStats) return;

      const ref = doc(db, "ai_models", "cpu_brain_v2");
      const deltaWeights = { ...cpuBrain.deltaWeights };
      const deltaStats = { ...cpuBrain.deltaStats };

      cpuBrain.deltaWeights = {};
      cpuBrain.deltaStats = { games: 0, wins: 0, losses: 0, moves: 0, captures: 0 };

      try {
        await runTransaction(db, async (tx) => {
          const snap = await tx.get(ref);
          const remote = snap.exists() ? snap.data() || {} : {};
          const nextWeights = { ...(remote.weights || {}) };
          const nextStats = {
            games: (remote.stats?.games || 0) + (deltaStats.games || 0),
            wins: (remote.stats?.wins || 0) + (deltaStats.wins || 0),
            losses: (remote.stats?.losses || 0) + (deltaStats.losses || 0),
            moves: (remote.stats?.moves || 0) + (deltaStats.moves || 0),
            captures: (remote.stats?.captures || 0) + (deltaStats.captures || 0)
          };
          for (const [k, v] of Object.entries(deltaWeights)) {
            nextWeights[k] = (nextWeights[k] || 0) + v;
          }
          tx.set(ref, {
            version: 2,
            weights: nextWeights,
            stats: nextStats,
            updatedAt: Date.now()
          }, { merge: true });
        });
      } catch {}
      saveCpuBrainToStorage();
    }

    async function enterRoom() {
      const code = normalizeRoomId(roomInput.value);
      const mode = specialModeFromCode(code);

      if (mode === "cpu" || mode === "local_dual") {
        session.kind = mode;
        setLocalRoom(mode);
        return;
      }

      session.kind = "online";
      clearTimers();

      try {
        let roomId = code;
        if (!roomId) {
          roomId = randRoomId();
          roomInput.value = roomId;
        }

        const ref = doc(db, "rooms", roomId);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
          await setDoc(ref, makeOnlineRoomDoc(state.playerId));
        }

        await connectOnlineRoom(roomId);
      } catch (err) {
        setStatus(`入室に失敗した: ${err.message}`);
      }
    }

          ctx.fillText("相手待ち", w / 2, h / 2 - 6);
          ctx.font = "500 14px system-ui, sans-serif";
          ctx.fillText("両方そろうまで移動できない", w / 2, h / 2 + 20);
        } else if (countdownText) {
          ctx.fillStyle = "rgba(0,0,0,.28)";
          ctx.fillRect(0, 0, w, h);
          ctx.fillStyle = "#fff";
          ctx.font = "900 54px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(countdownText, w / 2, h / 2 + 10);
          ctx.font = "600 16px system-ui, sans-serif";
          ctx.fillText(countdownText === "開始" ? "スタート" : "開始まで", w / 2, h / 2 + 44);
        }

        updateRematchOverlay();
        void handleGameEndIfNeeded();
      } catch (err) {
        console.error(err);
        setStatus(`描画エラー: ${err.message}`);
        scheduleRender(250);
        return;
      } finally {
        scheduleRender();
      }
    }

    function renderFrame() {
      drawBoardTextSafe();
    }

    enterBtn.addEventListener("click", enterRoom);

    shareBtn.addEventListener("click", async () => {
      const code = normalizeRoomId(roomInput.value || state.roomId || (session.kind === "cpu" ? "CPU" : session.kind === "local_dual" ? "1 SMARTPHONE" : ""));
      if (!code) {
        setStatus("共有するコードがないよ。");
        return;
      }

      if (!navigator.share) {
        setStatus("この端末は共有に対応していないよ。");
        return;
      }

      try {
        await navigator.share({ text: code });
        setStatus(`コードを共有したよ: ${code}`);
      } catch (err) {
        if (err && err.name !== "AbortError") {
          setStatus(`共有できなかった: ${err.message}`);
        }
      }
    });

    roomInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") enterRoom();
    });

    modeSelect.addEventListener("change", () => {
      localStorage.setItem("shogi_of_speed_mode", modeSelect.value);
      state.selected = null;
      state.dragSource = null;
      refreshHands();
      scheduleRender(0);
    });

    rematchYes.addEventListener("click", () => voteRematch(true));
    rematchNo.addEventListener("click", () => voteRematch(false));

    boardCanvas.addEventListener("click", async (ev) => {
      if (performance.now() < state.suppressClickUntil) return;
      if (!state.roomData) return;

      const sq = pointToSquare(ev);
      if (!sq) return;

      const clicked = pieceUnderSquare(sq.x, sq.y);
      const mode = modeSelect.value;
      const live = state.roomData.state;

      if (mode === "tap") {
        if (!state.selected) {
          if (clicked && canControlSide(clicked.side)) {
            state.selected = { kind: "piece", id: clicked.id };
            state.dragSource = "board";
            refreshHands();
            scheduleRender(0);
          }
          return;
        }

        if (state.selected.kind === "piece") {
          const selectedPiece = live.pieces.find(p => p.id === state.selected.id);

          if (selectedPiece && canControlSide(selectedPiece.side)) {
            const destBoard = screenToBoard(sq.x, sq.y);
            const move = selectedLegalMoveByScreen(live, selectedPiece, destBoard);
            if (move) {
              await commitMove(destBoard);
              clearSelection();
              return;
            }
          }

          if (clicked && canControlSide(clicked.side)) {
            state.selected = { kind: "piece", id: clicked.id };
            state.dragSource = "board";
            refreshHands();
            scheduleRender(0);
            return;
          }

          clearSelection();
          return;
        }

        if (state.selected.kind === "hand") {
          const destBoard = screenToBoard(sq.x, sq.y);
          await commitMove(destBoard);
          clearSelection();
          return;
        }
      }

      if (mode === "slide") {
        if (state.selected?.kind === "hand") {
          const destBoard = screenToBoard(sq.x, sq.y);
          await commitMove(destBoard);
          clearSelection();
          return;
        }

        if (clicked && canControlSide(clicked.side)) {
          state.selected = { kind: "piece", id: clicked.id };
          state.dragSource = "board";
          refreshHands();
          scheduleRender(0);
        }
      }
    });

    boardCanvas.addEventListener("pointerdown", (ev) => {
      if (modeSelect.value !== "slide") return;
      boardCanvas.setPointerCapture(ev.pointerId);
      state.dragPointerId = ev.pointerId;
      state.dragStart = { x: ev.clientX, y: ev.clientY };
      state.dragging = false;
      state.dragSource = "board";

      const sq = pointToSquare(ev);
      if (!sq) return;
      const clicked = pieceUnderSquare(sq.x, sq.y);
      const board = screenToBoard(sq.x, sq.y);

      if (state.selected?.kind === "hand") {
        const live = state.roomData?.state;
        const empty = live && !pieceAt(live.pieces, board.x, board.y);
        if (empty) {
          commitMove(board).then(() => clearSelection());
          return;
        }
      }

      if (clicked && canControlSide(clicked.side)) {
        state.selected = { kind: "piece", id: clicked.id };
        state.dragSource = "board";
        refreshHands();
        scheduleRender(0);
      }
    });

    boardCanvas.addEventListener("pointermove", (ev) => {
      if (modeSelect.value !== "slide") return;
      if (state.dragPointerId !== ev.pointerId || !state.dragStart) return;
      const dx = ev.clientX - state.dragStart.x;
      const dy = ev.clientY - state.dragStart.y;
      if (Math.hypot(dx, dy) > 6) state.dragging = true;
    });

    function finishSlidePointer(ev) {
      if (modeSelect.value !== "slide") return;
      if (state.dragPointerId != null && state.dragPointerId !== ev.pointerId) return;

      state.suppressClickUntil = performance.now() + 250;

      if (state.selected && state.selected.kind === "piece" && state.dragging) {
        const releasePoint = pointFromEvent(ev);
        const targetMove = getSlidePieceTarget(releasePoint);
        if (targetMove) {
          const live = state.roomData?.state;
          const selectedPiece = live?.pieces.find(p => p.id === state.selected.id);
          if (selectedPiece && canControlSide(selectedPiece.side)) {
            commitMove({ x: targetMove.x, y: targetMove.y }).then(() => {
              clearSelection();
            });
          }
        }
      }

      if (state.selected && state.selected.kind === "hand" && state.dragSource === "hand") {
        const targetBoard = getHandDropTarget(ev);
        if (targetBoard) {
          commitMove(targetBoard).then(() => {
            clearSelection();
          });
        }
      }

      state.dragPointerId = null;
      state.dragStart = null;
      state.dragging = false;
    }

    document.addEventListener("pointerup", finishSlidePointer, true);

    boardCanvas.addEventListener("pointercancel", () => {
      state.dragPointerId = null;
      state.dragStart = null;
      state.dragging = false;
      state.dragSource = null;
    });

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    refreshHands();
    updateMePill();
    updateRematchOverlay();
    scheduleRender(0);
    setStatus("ルームコードを入れて「入室 / 作成」を押してね。");

    if (session.kind === "cpu") {
      void syncCpuBrainFromCloud();
    }
  </script>
</body>
</html>
