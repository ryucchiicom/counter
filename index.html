<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>counter</title>
<style>
    body {
        margin: 0;
        background: #111;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        user-select: none;
        flex-direction: column;
    }

    #counter {
        font-size: 80px;
        text-align: center;
    }

    #step {
        font-size: 20px;
        margin-top: 10px;
        opacity: 0;
        transition: 0.15s;
    }

    #mobileControls {
        position: fixed;
        bottom: 20px;
        display: none;
        gap: 10px;
    }

    button {
        font-size: 24px;
        padding: 15px 25px;
        border: none;
        border-radius: 10px;
        background: #333;
        color: white;
    }

    button:active {
        background: #555;
    }

    @media (pointer: coarse) {
        #mobileControls {
            display: flex;
        }
    }
</style>
</head>
<body>

<div id="counter">0</div>
<div id="step">step: 1</div>

<div id="mobileControls">
    <button id="minus">-</button>
    <button onclick="reset()">0</button>
    <button id="plus">+</button>
</div>

<script>
let count = 0;
let step = 1;

const counter = document.getElementById("counter");
const stepDisplay = document.getElementById("step");

function update() {
    counter.textContent = count;
    stepDisplay.textContent = "step: " + step;
}

function change(val) {
    count += val;
    update();
}

function reset() {
    count = 0;
    update();
}

// ===== Shift表示 =====
document.addEventListener("keydown", (e) => {
    if (e.key === "Shift") stepDisplay.style.opacity = 1;
});
document.addEventListener("keyup", (e) => {
    if (e.key === "Shift") stepDisplay.style.opacity = 0;
});

// ===== PC操作 =====
document.addEventListener("mousedown", (e) => {

    if (e.shiftKey) {
        if (e.button === 2) step++;
        if (e.button === 0) step--;
        update();
        return;
    }

    if (e.button === 0) change(-step);
    if (e.button === 2) change(step);
    if (e.button === 1) reset();
});

document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("wheel", (e) => {

    if (e.shiftKey) {
        if (e.deltaY < 0) step++;
        else step--;
        update();
        return;
    }

    if (e.deltaY < 0) change(step);
    else change(-step);
});

document.addEventListener("mousedown", (e) => {
    if (e.button === 1 && e.ctrlKey) {
        step = 1;
        update();
    }
});

// ===== スマホ操作 =====
let pressTimer;

// +ボタン
document.getElementById("plus").addEventListener("touchstart", () => {
    pressTimer = setTimeout(() => {
        step++;
        update();
    }, 500);
});
document.getElementById("plus").addEventListener("touchend", () => {
    if (pressTimer) {
        clearTimeout(pressTimer);
        change(1);
    }
});

// -ボタン
document.getElementById("minus").addEventListener("touchstart", () => {
    pressTimer = setTimeout(() => {
        step--;
        update();
    }, 500);
});
document.getElementById("minus").addEventListener("touchend", () => {
    if (pressTimer) {
        clearTimeout(pressTimer);
        change(-1);
    }
});

update();
</script>

</body>
</html>
