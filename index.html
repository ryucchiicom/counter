<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>シンプルカウンター</title>
  <style>
    :root{
      --bg1:#eef6ff;
      --bg2:#ffffff;
      --card:#ffffffcc;
      --text:#1f2937;
      --sub:#6b7280;
      --accent:#2563eb;
      --accent2:#10b981;
      --danger:#ef4444;
      --shadow: 0 18px 50px rgba(37, 99, 235, 0.15);
      --border: rgba(37, 99, 235, 0.14);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, #dbeafe 0%, transparent 38%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(92vw, 760px);
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .titlebox h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.1;
      letter-spacing: 0.02em;
    }

    .titlebox p {
      margin: 8px 0 0;
      color: var(--sub);
      font-size: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: #f8fbff;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
    }

    .center {
      display: grid;
      place-items: center;
      padding: 18px 10px 8px;
      gap: 12px;
    }

    .count {
      font-size: clamp(72px, 16vw, 150px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.02em;
      color: var(--accent);
      text-shadow: 0 6px 0 rgba(37, 99, 235, 0.06);
      min-height: 1em;
    }

    .subline {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 14px;
      color: var(--sub);
      font-size: 14px;
      text-align: center;
    }

    .pill {
      border: 1px solid var(--border);
      background: #f8fbff;
      border-radius: 999px;
      padding: 8px 12px;
    }

    .grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255,255,255,0.7);
      padding: 14px 16px;
    }

    .panel .label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .panel .value {
      font-size: 22px;
      font-weight: 800;
      word-break: break-word;
    }

    .hint {
      margin-top: 16px;
      border-top: 1px solid rgba(37, 99, 235, 0.12);
      padding-top: 14px;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.7;
    }

    .hint strong {
      color: var(--text);
    }

    .flash {
      animation: flash 180ms ease-out;
    }

    @keyframes flash {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .mini {
      font-size: 12px;
      color: var(--sub);
    }

    .accent-add { color: var(--accent2); }
    .accent-sub { color: var(--danger); }

    @media (max-width: 560px) {
      .card { padding: 18px; border-radius: 22px; }
      .grid { grid-template-columns: 1fr; }
      .titlebox p { font-size: 13px; }
      .badge { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="card">
      <div class="top">
        <div class="titlebox">
          <h1>かんたんカウンター</h1>
          <p>右クリック・左クリック・ホイールで操作できる、見やすさ重視のカウンターです。</p>
        </div>
        <div class="badge" id="modeBadge">通常モード</div>
      </div>

      <div class="center">
        <div class="count" id="count">0</div>
        <div class="subline">
          <div class="pill">右クリック：増やす</div>
          <div class="pill">左クリック：減らす</div>
          <div class="pill">ホイール押し込み：0にリセット</div>
        </div>
      </div>

      <div class="grid">
        <div class="panel">
          <div class="label">増減の大きさ</div>
          <div class="value" id="stepView">1</div>
          <div class="mini">Ctrl を押しながらホイール上下で変更</div>
        </div>
        <div class="panel">
          <div class="label">今の操作</div>
          <div class="value" id="actionView">待機中</div>
          <div class="mini">Ctrl + ホイール押し込みで 1 に戻る</div>
        </div>
      </div>

      <div class="hint">
        <strong>使い方：</strong><br>
        ・右クリックでカウントを増やす<br>
        ・左クリックでカウントを減らす<br>
        ・マウスホイール上で増やす、下で減らす<br>
        ・ホイール押し込みで 0 にリセット<br>
        ・Ctrl を押しながらホイール上下で、何ずつ増減するかを変更<br>
        ・その数を <strong>-1</strong> まで下げると、増減が逆になります
      </div>
    </div>
  </div>

  <script>
    const countEl = document.getElementById("count");
    const stepViewEl = document.getElementById("stepView");
    const actionViewEl = document.getElementById("actionView");
    const modeBadge = document.getElementById("modeBadge");
    const card = document.getElementById("card");

    let count = 0;
    let step = 1;

    function render(actionText = "待機中") {
      countEl.textContent = count;
      stepViewEl.textContent = step;
      actionViewEl.textContent = actionText;

      if (step < 0) {
        modeBadge.textContent = "逆転モード";
        modeBadge.style.borderColor = "rgba(239, 68, 68, 0.22)";
        modeBadge.style.background = "rgba(254, 242, 242, 0.95)";
      } else {
        modeBadge.textContent = "通常モード";
        modeBadge.style.borderColor = "rgba(37, 99, 235, 0.14)";
        modeBadge.style.background = "#f8fbff";
      }

      card.classList.remove("flash");
      void card.offsetWidth;
      card.classList.add("flash");
    }

    function add(delta, actionText) {
      count += delta;
      render(actionText);
    }

    function changeStep(delta) {
      step += delta;
      if (step === 0) step = delta > 0 ? 1 : -1;
      render(`増減量を ${step} に変更`);
    }

    document.addEventListener("contextmenu", (e) => e.preventDefault());

    document.addEventListener("mousedown", (e) => {
      if (e.button === 0) {
        add(-step, `左クリック：${step} ずつ減らす`);
      } else if (e.button === 2) {
        add(step, `右クリック：${step} ずつ増やす`);
      } else if (e.button === 1) {
        count = 0;
        render("ホイール押し込み：0 にリセット");
      }
    });

    document.addEventListener("auxclick", (e) => {
      if (e.button === 1) {
        count = 0;
        render("ホイール押し込み：0 にリセット");
      }
    });

    document.addEventListener("wheel", (e) => {
      e.preventDefault();

      const ctrl = e.ctrlKey;

      if (ctrl) {
        if (e.deltaY < 0) {
          changeStep(1);
        } else if (e.deltaY > 0) {
          changeStep(-1);
        }
      } else {
        if (e.deltaY < 0) {
          add(step, `ホイール上：${step} ずつ増やす`);
        } else if (e.deltaY > 0) {
          add(-step, `ホイール下：${step} ずつ減らす`);
        }
      }
    }, { passive: false });

    document.addEventListener("keydown", (e) => {
      if (e.ctrlKey && (e.key === "0" || e.code === "Numpad0")) {
        step = 1;
        render("Ctrl + 0：増減量を 1 に戻す");
      }
    });

    render();
  </script>
</body>
</html>
