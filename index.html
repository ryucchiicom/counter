<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>counter</title>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        user-select: none;
        flex-direction: column;

        /* ★重要：常に透明（OBS対応） */
        background: transparent;
    }

    #counter {
        font-size: 80px;
        text-align: center;
    }

    #step {
        font-size: 20px;
        margin-top: 10px;
        opacity: 0;
        transition: 0.15s;
    }

    #mobileControls {
        position: fixed;
        bottom: 20px;
        display: none;
        gap: 10px;
    }

    button {
        font-size: 24px;
        padding: 15px 25px;
        border: none;
        border-radius: 10px;
        background: #333;
        color: white;
        transition: 0.2s;
    }

    button:active {
        background: #555;
    }

    .flash {
        background: #2b6cff !important;
    }

    .shiftOn {
        background: #2b6cff !important;
    }

    @media (pointer: coarse) {
        #mobileControls {
            display: flex;
        }
    }
</style>
</head>

<body>

<div id="counter">0</div>
<div id="step">step: 1</div>

<div id="mobileControls">
    <button id="btnMinus">-</button>
    <button id="btnReset">0</button>
    <button id="btnPlus">+</button>
    <button id="btnShift">Shift</button>
</div>

<script>
let count = 0;
let step = 1;
let shiftHold = false;

const counter = document.getElementById("counter");
const stepDisplay = document.getElementById("step");
const body = document.body;

const btnMinus = document.getElementById("btnMinus");
const btnPlus = document.getElementById("btnPlus");
const btnReset = document.getElementById("btnReset");
const btnShift = document.getElementById("btnShift");

function update() {
    counter.textContent = count;
    stepDisplay.textContent = "step: " + step;
}

function change(val) {
    count += val;
    update();
}

function reset() {
    count = 0;
    update();
}

/* =========================
   ★ テーマ（修正済み）
   背景は絶対に変えない
========================= */
function setWhiteText() {
    body.style.color = "#fff";
}

function setBlackText() {
    body.style.color = "#000";
}

/* L / D */
document.addEventListener("keydown", (e) => {
    if (e.key === "l" || e.key === "L") setWhiteText();
    if (e.key === "d" || e.key === "D") setBlackText();
});

/* =========================
   キーボード操作
========================= */
document.addEventListener("keydown", (e) => {

    // +系
    if (["w", "ArrowUp", "ArrowRight", ";"].includes(e.key)) {
        if (e.shiftKey) step++;
        else change(step);
    }

    // -系
    if (["s", "ArrowDown", "ArrowLeft", "-"].includes(e.key)) {
        if (e.shiftKey) step--;
        else change(-step);
    }

    if (e.key === "Shift") {
        stepDisplay.style.opacity = 1;
    }
});

document.addEventListener("keyup", (e) => {
    if (e.key === "Shift") {
        stepDisplay.style.opacity = 0;
    }
});

/* =========================
   PCマウス操作
========================= */
const isMobile = window.matchMedia("(pointer: coarse)").matches;

if (!isMobile) {

    document.addEventListener("mousedown", (e) => {

        if (e.shiftKey) {
            if (e.button === 2) step++;
            if (e.button === 0) step--;
            update();
            flash();
            return;
        }

        if (e.button === 0) change(-step);
        if (e.button === 2) change(step);
        if (e.button === 1) reset();

        flash();
    });

    document.addEventListener("contextmenu", e => e.preventDefault());

    document.addEventListener("wheel", (e) => {
        if (e.shiftKey) {
            if (e.deltaY < 0) step++;
            else step--;
            update();
            return;
        }

        if (e.deltaY < 0) change(step);
        else change(-step);
    });

    document.addEventListener("mousedown", (e) => {
        if (e.button === 1 && e.ctrlKey) {
            step = 1;
            update();
        }
    });
}

/* =========================
   スマホ操作
========================= */
btnPlus.onclick = () => { change(step); flash(btnPlus); };
btnMinus.onclick = () => { change(-step); flash(btnMinus); };
btnReset.onclick = () => { reset(); flash(btnReset); };

btnShift.onclick = () => {
    shiftHold = !shiftHold;

    if (shiftHold) {
        btnShift.classList.add("shiftOn");
    } else {
        btnShift.classList.remove("shiftOn");
    }

    flash(btnShift);
};

/* =========================
   フラッシュ演出
========================= */
function flash(btn) {
    if (!btn) return;
    btn.classList.add("flash");
    setTimeout(() => btn.classList.remove("flash"), 500);
}

update();
</script>

</body>
</html>
