<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>counter</title>
<style>
    body {
        margin: 0;
        background: #111;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        user-select: none;
    }

    #counter {
        font-size: 80px;
        text-align: center;
    }

    #step {
        position: fixed;
        top: 20px;
        font-size: 20px;
        opacity: 0;
        transition: 0.15s;
    }

    #mobileControls {
        position: fixed;
        bottom: 20px;
        display: none;
        gap: 10px;
    }

    button {
        font-size: 24px;
        padding: 15px 25px;
        border: none;
        border-radius: 10px;
        background: #333;
        color: white;
    }

    button:active {
        background: #555;
    }

    @media (pointer: coarse) {
        #mobileControls {
            display: flex;
        }
    }
</style>
</head>
<body>

<div id="counter">0</div>
<div id="step">step: 1</div>

<div id="mobileControls">
    <button onclick="change(-step)">-</button>
    <button onclick="reset()">0</button>
    <button onclick="change(step)">+</button>
</div>

<script>
let count = 0;
let step = 1;

const counter = document.getElementById("counter");
const stepDisplay = document.getElementById("step");

function update() {
    counter.textContent = count;
    stepDisplay.textContent = "step: " + step;
}

function change(val) {
    count += val;
    update();
}

function reset() {
    count = 0;
    update();
}

// Shift表示制御
document.addEventListener("keydown", (e) => {
    if (e.key === "Shift") {
        stepDisplay.style.opacity = 1;
    }
});

document.addEventListener("keyup", (e) => {
    if (e.key === "Shift") {
        stepDisplay.style.opacity = 0;
    }
});

// クリック操作
document.addEventListener("mousedown", (e) => {

    // Shift押しながらクリック → step変更
    if (e.shiftKey) {
        if (e.button === 2) {
            step++;
        } else if (e.button === 0) {
            step--;
            if (step === 0) step = -1;
        }
        update();
        return;
    }

    // 通常操作
    if (e.button === 0) {
        change(-step);
    } else if (e.button === 2) {
        change(step);
    } else if (e.button === 1) {
        reset();
    }
});

// 右クリックメニュー禁止
document.addEventListener("contextmenu", e => e.preventDefault());

// マウスホイール
document.addEventListener("wheel", (e) => {

    // Shift + ホイール → step変更
    if (e.shiftKey) {
        if (e.deltaY < 0) {
            step++;
        } else {
            step--;
            if (step === 0) step = -1;
        }
        update();
        return;
    }

    // 通常ホイール
    if (e.deltaY < 0) {
        change(step);
    } else {
        change(-step);
    }
});

// Ctrl + ホイール押し込みでstepリセット
document.addEventListener("mousedown", (e) => {
    if (e.button === 1 && e.ctrlKey) {
        step = 1;
        update();
    }
});

update();
</script>

</body>
</html>
