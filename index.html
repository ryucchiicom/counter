<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter</title>
<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        user-select: none;
    }

    #container {
        text-align: center;
    }

    #count {
        font-size: 80px;
        margin-bottom: 20px;
    }

    #step {
        font-size: 20px;
        opacity: 0.6;
    }

    .btns {
        display: none;
        margin-top: 20px;
        gap: 10px;
        justify-content: center;
    }

    button {
        font-size: 24px;
        padding: 15px 25px;
        border: none;
        border-radius: 10px;
        background: #333;
        color: white;
    }

    button:active {
        background: #555;
    }

    @media (pointer: coarse) {
        .btns {
            display: flex;
        }
    }
</style>
</head>
<body>

<div id="container">
    <div id="count">0</div>
    <div id="step">step: 1</div>

    <div class="btns">
        <button onclick="change(-step)">−</button>
        <button onclick="reset()">0</button>
        <button onclick="change(step)">＋</button>
    </div>
</div>

<script>
let count = 0;
let step = 1;

const countEl = document.getElementById("count");
const stepEl = document.getElementById("step");

function update() {
    countEl.textContent = count;
    stepEl.textContent = "step: " + step;
}

function change(val) {
    count += val;
    update();
}

function reset() {
    count = 0;
    update();
}

// クリック
document.addEventListener("mousedown", e => {
    if (e.button === 0) change(-step); // 左
    if (e.button === 2) change(step);  // 右
});

// 右クリックメニュー無効
document.addEventListener("contextmenu", e => e.preventDefault());

// ホイール
document.addEventListener("wheel", e => {
    if (e.ctrlKey) return; // Ctrl中は別処理
    if (e.deltaY < 0) change(step);
    else change(-step);
});

// ホイール押し込み（中央クリック）
document.addEventListener("mousedown", e => {
    if (e.button === 1) reset();
});

// Ctrl + ホイールでstep変更
document.addEventListener("wheel", e => {
    if (!e.ctrlKey) return;

    if (e.deltaY < 0) step++;
    else step--;

    if (step === 0) step = -1;

    update();
});

// Ctrl + ホイール押し込みでstepリセット
document.addEventListener("mousedown", e => {
    if (e.button === 1 && e.ctrlKey) {
        step = 1;
        update();
    }
});

// Ctrl + ↑キーでも変更
document.addEventListener("keydown", e => {
    if (e.ctrlKey && e.key === "ArrowUp") {
        step++;
        update();
    }
});

update();
</script>

</body>
</html>
