<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>counter</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    user-select: none;
    flex-direction: column;
    transition: 0.2s;
}

#counter {
    font-size: 80px;
}

#step {
    font-size: 20px;
    margin-top: 10px;
    opacity: 0;
    transition: 0.15s;
}

#mobileControls {
    position: fixed;
    bottom: 20px;
    display: none;
    gap: 10px;
}

button {
    font-size: 22px;
    padding: 14px 20px;
    border: none;
    border-radius: 10px;
    background: #333;
    color: white;
    transition: 0.15s;
}

button.active {
    background: #2b6cff !important;
}

@media (pointer: coarse) {
    #mobileControls {
        display: flex;
    }
}
</style>

</head>
<body>

<div id="counter">0</div>
<div id="step">step: 1</div>

<div id="mobileControls">
    <button id="btnMinus">-</button>
    <button id="btnReset">0</button>
    <button id="btnPlus">+</button>
    <button id="btnShift">Shift</button>
</div>

<script>
let count = 0;
let step = 1;
let shiftOn = false;

const counter = document.getElementById("counter");
const stepDisplay = document.getElementById("step");
const body = document.body;

function update() {
    counter.textContent = count;
    stepDisplay.textContent = "step: " + step;
}

function change(val) {
    count += val;
    update();
}

function reset() {
    count = 0;
    update();
}

// テーマ切り替え
function setLightMode(isLight) {
    if (isLight) {
        body.style.background = "#fff";
        body.style.color = "#000";
    } else {
        body.style.background = "#111";
        body.style.color = "#fff";
    }
}

// L / D
document.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "l") setLightMode(false);
    if (e.key.toLowerCase() === "d") setLightMode(true);
});

// Shift表示（PC）
document.addEventListener("keydown", (e) => {
    if (e.key === "Shift") {
        stepDisplay.style.opacity = 1;
    }
});
document.addEventListener("keyup", (e) => {
    if (e.key === "Shift") {
        stepDisplay.style.opacity = 0;
    }
});

// 入力判定
function add() { change(step); }
function sub() { change(-step); }

function flashButton(btn) {
    btn.classList.add("active");
    setTimeout(() => btn.classList.remove("active"), 500);
}

// キーボード操作
document.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();

    // +系
    if (k === "w" || k === "d" || k === "arrowup" || k === "arrowright" || k === ";") {
        if (e.shiftKey) step++;
        else add();
        return;
    }

    // -系
    if (k === "s" || k === "a" || k === "arrowdown" || k === "arrowleft" || k === "-") {
        if (e.shiftKey) step--;
        else sub();
        return;
    }
});

// マウス（PC）
document.addEventListener("mousedown", (e) => {
    if (e.shiftKey) {
        if (e.button === 2) step++;
        if (e.button === 0) step--;
        update();
        return;
    }

    if (e.button === 0) change(-step);
    if (e.button === 2) change(step);
    if (e.button === 1) reset();
});

document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("wheel", (e) => {
    if (e.shiftKey) {
        if (e.deltaY < 0) step++;
        else step--;
        update();
        return;
    }

    if (e.deltaY < 0) change(step);
    else change(-step);
});

// スマホ
const btnMinus = document.getElementById("btnMinus");
const btnPlus = document.getElementById("btnPlus");
const btnReset = document.getElementById("btnReset");
const btnShift = document.getElementById("btnShift");

btnPlus.onclick = () => { change(step); flashButton(btnPlus); };
btnMinus.onclick = () => { change(-step); flashButton(btnMinus); };
btnReset.onclick = () => { reset(); flashButton(btnReset); };

// Shiftトグル（スマホ）
btnShift.onclick = () => {
    shiftOn = !shiftOn;
    btnShift.classList.toggle("active", shiftOn);
};

// スマホはShiftON時だけstep変更扱い
document.addEventListener("mousedown", (e) => {
    if (shiftOn && e.button === 0) step--;
    if (shiftOn && e.button === 2) step++;
});

update();
</script>

</body>
</html>
